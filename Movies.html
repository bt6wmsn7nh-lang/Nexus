<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Movies</title>




<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}




header{
padding:20px;
font-size:28px;
font-weight:bold;
}




#movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:30px;
}




.movie{
background:#1e293b;
border-radius:12px;
cursor:pointer;
transition:.2s;
}




.movie:hover{
transform:scale(1.05);
}




.movie img{
width:100%;
border-radius:12px 12px 0 0;
}




.movie p{
padding:10px;
}




#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
}




video{
width:100%;
height:100%;
}




#close{
position:absolute;
top:20px;
right:20px;
padding:10px 15px;
background:red;
border:none;
color:white;
font-size:18px;
cursor:pointer;
border-radius:6px;
}
</style>
</head>




<body>




<header>🎬 Flux Movies</header>




<div id="movies">




<div class="movie" onclick="playMovie('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4')">
<img src="https://peach.blender.org/wp-content/uploads/title_anouncement.jpg?x11217">
<p>Big Buck Bunny</p>
</div>




<div class="movie" onclick="playMovie('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4')">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Elephants_Dream_s1_proog.jpg/640px-Elephants_Dream_s1_proog.jpg">
<p>Elephants Dream</p>
</div>




</div>




<div id="player">
<button id="close" onclick="closeMovie()">✕</button>
<video id="videoPlayer" controls autoplay></video>
</div>




<script>
function playMovie(url){
const player=document.getElementById("player")
const video=document.getElementById("videoPlayer")




video.src=url
player.style.display="flex"
}




function closeMovie(){
const player=document.getElementById("player")
const video=document.getElementById("videoPlayer")




video.pause()
video.src=""
player.style.display="none"
}
</script>




</body>
</html>
